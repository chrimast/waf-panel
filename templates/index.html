<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAF 管理面板</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#1a1b1e;--card:#25262b;--border:#373a40;--text:#c1c2c5;--muted:#909296;--primary:#4c6ef5;--danger:#e03131;--success:#2f9e44;--warning:#f08c00;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--card);padding:20px 0;border-right:1px solid var(--border);flex-shrink:0}
.sidebar h2{padding:0 20px 20px;font-size:16px;color:#fff;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar a{display:block;padding:10px 20px;color:var(--muted);text-decoration:none;font-size:14px;transition:.2s;border-left:3px solid transparent;cursor:pointer}
.sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.05);border-left-color:var(--primary)}
.main{flex:1;padding:24px;overflow-y:auto;max-height:100vh}
h1{font-size:22px;margin-bottom:20px;color:#fff}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card .label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700;color:#fff}
.card .sub{font-size:12px;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse}th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;background:rgba(255,255,255,.02);position:sticky;top:0}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-danger{background:rgba(224,49,49,.2);color:var(--danger)}.badge-success{background:rgba(47,158,68,.2);color:var(--success)}.badge-warn{background:rgba(240,140,0,.2);color:var(--warning)}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--danger);color:#fff}.btn-sm{padding:4px 10px;font-size:12px}
input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
.form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.flex{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.toggle{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:.3s;display:inline-block}
.toggle.on{background:var(--success)}.toggle.off{background:var(--border)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.3s}
.toggle.on::after{left:22px}
.pagination{display:flex;gap:8px;margin-top:16px;justify-content:center}
.pagination button{padding:6px 12px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px}
.pagination button.active{background:var(--primary);border-color:var(--primary);color:#fff}
.pagination button:disabled{opacity:.4;cursor:default}
#map{height:400px;border-radius:var(--radius);margin-bottom:24px;border:1px solid var(--border)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid var(--border)}
.modal h3{margin-bottom:16px;color:#fff}.modal-close{float:right;cursor:pointer;color:var(--muted);font-size:20px;background:none;border:none}
pre{background:var(--bg);padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:2000;animation:slideUp .3s}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:40px;color:var(--muted)}.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<nav class="sidebar">
  <h2>🛡️ WAF Panel</h2>
  <a class="nav-link active" onclick="nav('dashboard')">📊 仪表盘</a>
  <a class="nav-link" onclick="nav('logs')">📋 攻击日志</a>
  <a class="nav-link" onclick="nav('mapview')">🗺️ 拦截地图</a>
  <a class="nav-link" onclick="nav('blocks')">🚫 封锁记录</a>
  <a class="nav-link" onclick="nav('geo')">🌍 地理封禁</a>
  <a class="nav-link" onclick="nav('blacklist')">🔒 IP黑/白名单</a>
  <a class="nav-link" onclick="nav('pages')">📄 拦截页面</a>
</nav>
<main class="main" id="main"></main>
<div id="toast"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),api=async(action,opt={})=>{const u='/api/'+action+(opt.params?'?'+new URLSearchParams(opt.params):'');const r=await fetch(u,{method:opt.method||'GET',headers:{'Content-Type':'application/json'},body:opt.body?JSON.stringify(opt.body):void 0});if(r.status===401){const j=await r.json();if(j.need_login){location.href='/login';return{}}}return r.json()};
function toast(msg,type='success'){const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function setMain(h){$('#main').innerHTML=h}
function nav(page){$$('.nav-link').forEach(a=>a.classList.remove('active'));const l=$(`.nav-link:nth-child(${{dashboard:2,logs:3,mapview:4,blocks:5,geo:6,blacklist:7,pages:8}[page]})`);if(l)l.classList.add('active');window['page_'+page]()}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ipRuleValue(rule){if(typeof rule==='string')return rule;if(!rule||typeof rule!=='object')return '';if(rule.type==='ipv4')return rule.ipv4||'';if(rule.type==='ipv6')return rule.ipv6||'';if(rule.type==='ipGroup')return rule.ipGroup||'';if(rule.type==='ipArr')return `${rule.ipStart||''}-${rule.ipEnd||''}`;return rule.ipv4||rule.ipv6||rule.ipGroup||''}

async function page_dashboard(){
  const d=await api('dashboard');if(!d)return;
  const s=d.waf_state==='on'?'运行中':'已关闭',sc=d.waf_state==='on'?'badge-success':'badge-danger';
  const t=d.waf_stat&&d.waf_stat[0]||{};
  setMain(`<h1>📊 仪表盘</h1>
<div class="cards">
  <div class="card"><div class="label">WAF 状态</div><div class="value"><span class="badge ${sc}">${s}</span></div><div class="sub">模式: ${d.waf_mode||'?'}</div></div>
  <div class="card"><div class="label">今日请求</div><div class="value">${t.req_count||0}</div><div class="sub">4xx: ${t.count4xx||0} | 5xx: ${t.count5xx||0}</div></div>
  <div class="card"><div class="label">今日攻击</div><div class="value" style="color:var(--danger)">${t.attack_count||0}</div><div class="sub">${t.req_count?(t.attack_count/t.req_count*100).toFixed(1)+'%':'0%'}</div></div>
  <div class="card"><div class="label">Top IP</div><div class="value" style="font-size:18px">${d.top_ips&&d.top_ips[0]?d.top_ips[0].ip:'—'}</div><div class="sub">${d.top_ips&&d.top_ips[0]?d.top_ips[0].count+' 次':''}</div></div>
</div>
<div class="card"><div class="flex"><h3 style="color:#fff;font-size:15px">最近攻击</h3></div>
<table><thead><tr><th>时间</th><th>IP</th><th>规则</th><th>URI</th><th>状态</th></tr></thead>
<tbody>${(d.recent||[]).map(r=>`<tr><td>${r.localtime||''}</td><td><code>${r.ip||''}</code></td><td><span class="badge badge-warn">${r.rule||''}</span></td><td>${r.uri||''}</td><td>${r.is_block?'<span class="badge badge-danger">拦截</span>':'<span class="badge badge-success">记录</span>'}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无攻击</td></tr>'}</tbody></table></div>`);
}

let _logPage=1,_logTotal=0;
async function page_logs(){await loadLogs(1)}
async function loadLogs(p,search=''){
  _logPage=p;const d=await api('logs',{params:{page:p,limit:20,search}});if(!d)return;
  _logTotal=d.total;_logPage=p;
  setMain(`<h1>📋 攻击日志</h1><div class="card">
<div class="flex"><div class="row"><input placeholder="搜索 IP/规则/URI..." id="logSearch" style="width:260px" onkeyup="event.key==='Enter'&&loadLogs(1,this.value)"><button class="btn btn-primary" onclick="loadLogs(1,\$('#logSearch').value)">搜索</button></div><span style="color:var(--muted);font-size:13px">共 ${d.total} 条</span></div>
<table><thead><tr><th>时间</th><th>IP</th><th>规则</th><th>URI</th><th>匹配值</th><th>状态</th><th>操作</th></tr></thead>
<tbody>${d.data.map(r=>`<tr><td>${r.localtime||''}</td><td><code>${r.ip||''}</code></td><td><span class="badge badge-warn">${r.rule||''}</span></td><td>${r.uri||''}</td><td>${r.match_val?`<code>${r.match_val}</code>`:''}</td><td>${r.is_block?'<span class="badge badge-danger">拦截</span>':'<span class="badge badge-success">记录</span>'}</td><td><button class="btn btn-primary btn-sm" onclick="showDetail(${r.id})">详情</button></td></tr>`).join('')||'<tr><td colspan="7" class="empty">暂无</td></tr>'}</tbody></table>
<div class="pagination" id="logPages">${renderPagination(d.total,20,p)}</div></div>`);
}
function renderPagination(total,limit,page){
  const pages=Math.ceil(total/limit);let h='';
  h+=`<button ${page<=1?'disabled':''} onclick="loadLogs(${page-1},\$('#logSearch')?.\$('#logSearch').value||'')">‹</button>`;
  for(let i=1;i<=pages;i++){if(pages>10&&i>2&&i<page-1)continue;if(pages>10&&i<page+3&&i>page+1)continue;h+=`<button class="${i===page?'active':''}" onclick="loadLogs(${i},\$('#logSearch')?.\$('#logSearch').value||'')">${i}</button>`}
  h+=`<button ${page>=pages?'disabled':''} onclick="loadLogs(${page+1},\$('#logSearch')?.\$('#logSearch').value||'')">›</button>`;
  return h;
}
async function showDetail(id){
  const d=await api('log_detail',{params:{id}});if(!d)return;
  document.body.innerHTML+=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal">
<button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><h3>攻击详情 #${d.id}</h3>
<table><tr><td style="color:var(--muted);width:80px">时间</td><td>${d.localtime}</td></tr>
<tr><td style="color:var(--muted)">IP</td><td><code>${d.ip||'?'}</code></td></tr>
<tr><td style="color:var(--muted)">规则</td><td><span class="badge badge-warn">${d.rule||'?'}</span></td></tr>
<tr><td style="color:var(--muted)">URI</td><td>${d.uri||'?'}</td></tr>
<tr><td style="color:var(--muted)">方法</td><td>${d.method||'?'}</td></tr>
<tr><td style="color:var(--muted)">状态码</td><td>${d.status_code||'?'}</td></tr>
<tr><td style="color:var(--muted)">UA</td><td style="font-size:12px">${d.user_agent||'—'}</td></tr>
<tr><td style="color:var(--muted)">拦截</td><td>${d.is_block?'<span class="badge badge-danger">是</span>':'<span class="badge badge-success">否</span>'}</td></tr></table>
<h4 style="margin-top:16px;color:var(--muted);font-size:13px">原始请求</h4><pre>${d.nginx_log||'—'}</pre></div></div>`;
}

async function page_mapview(){
  setMain(`<h1>🗺️ 拦截地图</h1><div id="map"></div><div class="loading">加载中...</div>`);
  const d=await api('map');if(!d)return;
  $('#main .loading').remove();
  if(!d.points.length){$('#map').outerHTML='<div class="empty" style="height:400px">暂无数据</div>';return}
  const map=L.map('map').setView([30,20],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:18}).addTo(map);
  d.points.forEach(p=>{L.circleMarker([p.lat,p.lon],{radius:Math.min(20,6+Math.log(p.count+1)*3),fillColor:'#e03131',color:'#ff6b6b',weight:1,fillOpacity:.7}).addTo(map).bindPopup(`<b>${p.ip}</b><br>${p.country}, ${p.city||''}<br>攻击: ${p.count}次<br>最近: ${p.last_time}`)});
}

async function page_blocks(){
  const d=await api('blocks',{params:{page:1,limit:30}});if(!d)return;
  setMain(`<h1>🚫 封锁记录</h1><div class="card"><table><thead><tr><th>封锁时间</th><th>IP</th><th>时长</th><th>状态</th><th>操作</th></tr></thead>
<tbody>${d.data.map(r=>`<tr><td>${r.create_date||''}</td><td><code>${r.ip||''}</code></td><td>${r.blocking_time?r.blocking_time+'s':'永久'}</td><td>${r.is_block?'<span class="badge badge-danger">封锁中</span>':'<span class="badge badge-success">已解除</span>'}</td><td><button class="btn btn-danger btn-sm" onclick="unblock(${r.id})">解封</button></td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无</td></tr>'}</tbody></table></div>`);
}
async function unblock(id){const r=await api('unblock',{method:'POST',body:{id}});if(r&&r.ok){toast('已解封');page_blocks()}}

let _geoState='off';
async function page_geo(){
  const d=await api('geo_config');if(!d)return;_geoState=d.state;
  setMain(`<h1>🌍 地理位置封禁</h1>
<div class="card" style="margin-bottom:16px">
<h3 style="color:#fff;font-size:15px;margin-bottom:12px">按国家/地区封禁</h3>
<div class="form-group"><label>状态</label><button class="btn ${d.state==='on'?'btn-danger':'btn-primary'}" id="geoBtn" onclick="toggleGeo()">${d.state==='on'?'已启用':'已关闭'}</button></div>
<div class="form-group"><label>动作</label><select id="geoAction"><option value="deny" ${d.action==='deny'?'selected':''}>拒绝访问</option><option value="allow" ${d.action==='allow'?'selected':''}>仅允许</option></select></div>
<div class="form-group"><label>国家代码（逗号分隔，如 CN,US,RU）</label><input id="geoRules" value="${(d.rules||[]).join(',')}" placeholder="CN,US,RU,IN..."></div>
<button class="btn btn-primary" onclick="saveGeo()">💾 保存并重载</button>
</div>
<div class="card">
<h3 style="color:#fff;font-size:15px;margin-bottom:12px">按 ASN 封禁</h3>
<div class="row"><input id="asnInput" placeholder="输入 ASN，如 AS4134" style="width:200px"><button class="btn btn-primary btn-sm" onclick="lookupASN()">查询</button></div>
<div id="asnResult" style="margin-top:12px"></div>
</div>`);
}
async function lookupASN(){
  const asn=$('#asnInput').value.trim();if(!asn)return;
  $('#asnResult').innerHTML='<div class="loading">查询中...</div>';
  const d=await api('asn_lookup',{params:{asn}});
  if(!d||d.error){$('#asnResult').innerHTML=`<p style="color:var(--danger)">${d?.message||'查询失败'}</p>`;return}
  let html=`<p style="margin-bottom:8px"><b>${d.name}</b> — ${d.count} 个 IP 范围</p>`;
  html+=`<button class="btn btn-danger btn-sm" onclick="blockASN('${d.asn}')">封禁此 ASN 全部 IP</button>`;
  html+=`<div style="max-height:300px;overflow-y:auto;margin-top:8px"><table>`;
  d.prefixes.slice(0,50).forEach(p=>{html+=`<tr><td><code>${p.prefix}</code></td><td>${p.description||''}</td><td><button class="btn btn-sm btn-danger" onclick="addSingleIP('${p.prefix}')">添加</button></td></tr>`});
  if(d.prefixes.length>50)html+=`<tr><td colspan="3" style="color:var(--muted)">... 还有 ${d.prefixes.length-50} 个范围</td></tr>`;
  html+=`</table></div>`;
  window._asnPrefixes=d.prefixes;
  $('#asnResult').innerHTML=html;
}
async function blockASN(asn){
  if(!confirm(`确认将 ${asn} 的 ${window._asnPrefixes.length} 个 IP 范围加入黑名单？`))return;
  const r=await api('asn_block',{method:'POST',body:{prefixes:window._asnPrefixes}});
  if(r&&r.ok)toast(r.message);else toast('操作失败','error');
}
async function addSingleIP(prefix){
  const r=await api('blacklist_add',{method:'POST',body:{ip:prefix,type:'black'}});
  if(r&&r.ok)toast(`已添加 ${prefix}`);else toast('添加失败','error');
}
function toggleGeo(){_geoState=_geoState==='on'?'off':'on';const b=$('#geoBtn');b.textContent=_geoState==='on'?'已启用':'已关闭';b.className='btn '+(b.textContent==='已启用'?'btn-danger':'btn-primary')}
async function saveGeo(){const d=await api('geo_config',{method:'POST',body:{state:_geoState,action:$('#geoAction').value,rules:$('#geoRules').value.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean)}});if(d&&d.ok)toast('已保存并重载')}

let _blType='black';
async function page_blacklist(){
  const d=await api('blacklist');if(!d)return;
  setMain(`<h1>🔒 IP黑/白名单</h1>
<div class="card">
<div class="flex"><div class="row" style="margin-bottom:12px"><button class="btn btn-sm ${_blType==='black'?'btn-primary':''}" style="background:${_blType==='black'?'var(--primary)':'var(--border)'}" onclick="_blType='black';page_blacklist()">黑名单 (${d.ipBlack.length})</button><button class="btn btn-sm ${_blType==='white'?'btn-primary':''}" style="background:${_blType==='white'?'var(--primary)':'var(--border)'}" onclick="_blType='white';page_blacklist()">白名单 (${d.ipWhite.length})</button></div></div>
<div class="row"><input id="newIP" placeholder="IP 地址" style="width:200px"><button class="btn btn-primary btn-sm" onclick="addIP()">添加</button></div>
<table style="margin-top:12px"><thead><tr><th>IP</th><th>操作</th></tr></thead>
<tbody>${(_blType==='black'?d.ipBlack:d.ipWhite).map(rule=>{const ip=ipRuleValue(rule);return `<tr><td><code>${ip}</code></td><td><button class="btn btn-danger btn-sm" onclick="removeIP('${ip}')">移除</button></td></tr>`}).join('')||'<tr><td colspan="2" class="empty">暂无</td></tr>'}</tbody></table></div>`);
}
async function addIP(){const ip=$('#newIP').value.trim();if(!ip)return;const r=await api('blacklist_add',{method:'POST',body:{ip,type:_blType}});if(r&&r.ok){toast(r.message);$('#newIP').value='';page_blacklist()}}
async function removeIP(ip){const r=await api('blacklist_remove',{method:'POST',body:{ip,type:_blType}});if(r&&r.ok){toast(r.message);page_blacklist()}}

async function page_pages(){
  const d=await api('pages');if(!d)return;
  setMain(`<h1>📄 拦截页面</h1><div class="card"><table><thead><tr><th>文件名</th><th>大小</th><th>修改时间</th><th>操作</th></tr></thead>
<tbody>${d.pages.map(p=>`<tr><td><code>${p.name}</code></td><td>${(p.size/1024).toFixed(1)}KB</td><td>${new Date(p.mtime*1000).toLocaleString()}</td><td><button class="btn btn-primary btn-sm" onclick="editPage('${p.name}')">编辑</button></td></tr>`).join('')}</tbody></table></div>`);
}
async function editPage(name){
  const d=await api('page_get',{params:{name}});if(!d)return;
  setMain(`<h1>📄 编辑: ${name}</h1><div class="card"><textarea id="pgContent" style="height:60vh;font-family:monospace;font-size:12px">${escapeHtml(d.content)}</textarea>
<div class="row" style="margin-top:12px"><button class="btn btn-primary" onclick="savePage('${name}')">💾 保存并重载</button><button class="btn" style="background:var(--border)" onclick="page_pages()">← 返回</button></div></div>`);
}
async function savePage(name){const r=await api('page_save',{method:'POST',body:{name,content:$('#pgContent').value}});if(r&&r.ok)toast('已保存并重载')}

nav('dashboard');
</script>
</body>
</html>
