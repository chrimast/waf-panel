<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAF 管理面板</title>
<link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css"/>
<style>
:root{--bg:#f5f7fb;--card:#ffffff;--border:#d8dee9;--text:#1f2937;--muted:#667085;--primary:#2563eb;--danger:#dc2626;--success:#16a34a;--warning:#d97706;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:150px;background:#fff;padding:16px 0;border-right:1px solid var(--border);flex-shrink:0}
.sidebar h2{padding:0 12px 16px;font-size:14px;color:#111827;border-bottom:1px solid var(--border);margin-bottom:10px}
.sidebar a{display:block;padding:9px 12px;color:var(--muted);text-decoration:none;font-size:13px;transition:.2s;border-left:3px solid transparent;cursor:pointer;white-space:nowrap}
.sidebar a:hover,.sidebar a.active{color:#111827;background:#eef4ff;border-left-color:var(--primary)}
.main{flex:1;min-width:0;padding:24px;overflow-y:auto;max-height:100vh}
h1{font-size:22px;margin-bottom:20px;color:#111827}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card .label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700;color:#111827}
.card .sub{font-size:12px;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse}th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;background:#f8fafc;position:sticky;top:0}
tr:hover td{background:#f8fafc}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-danger{background:rgba(224,49,49,.2);color:var(--danger)}.badge-success{background:rgba(47,158,68,.2);color:var(--success)}.badge-warn{background:rgba(240,140,0,.2);color:var(--warning)}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--danger);color:#fff}.btn-sm{padding:4px 10px;font-size:12px}
input,select,textarea{background:#fff;border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
.form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.flex{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:15px;color:#111827;margin-bottom:14px}
.table-scroll{width:100%;overflow-x:auto}
.attack-log-table table{min-width:1180px;table-layout:fixed}
.attack-log-table th:nth-child(1){width:160px}.attack-log-table th:nth-child(2){width:140px}.attack-log-table th:nth-child(3){width:140px}.attack-log-table th:nth-child(4){width:220px}.attack-log-table th:nth-child(5){width:200px}.attack-log-table th:nth-child(6){width:110px}.attack-log-table th:nth-child(7){width:120px}.attack-log-table th:nth-child(8){width:70px}
.attack-log-table th,.attack-log-table td{vertical-align:middle}.attack-log-table td:nth-child(1),.attack-log-table td:nth-child(2),.attack-log-table td:nth-child(6),.attack-log-table td:nth-child(7),.attack-log-table td:nth-child(8){white-space:nowrap}
.cell-clip{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dashboard-map{height:420px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;background:#eef2f7}
.dashboard-recent{margin-bottom:24px}
.dashboard-grid{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(320px,.75fr);gap:16px;margin-bottom:24px;align-items:start}
.geo-controls{display:grid;grid-template-columns:130px 180px minmax(220px,1fr);gap:12px;align-items:end}
.geo-controls .form-group{margin-bottom:0}
.toggle{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:.3s;display:inline-block}
.toggle.on{background:var(--success)}.toggle.off{background:var(--border)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.3s}
.toggle.on::after{left:22px}
.pagination{display:flex;gap:8px;margin-top:16px;justify-content:center;align-items:center;flex-wrap:wrap;clear:both}
.pagination button{width:34px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px;line-height:1;flex:0 0 34px}
.pagination button.active{background:var(--primary);border-color:var(--primary);color:#fff}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .ellipsis{width:24px;text-align:center;color:var(--muted);flex:0 0 24px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid var(--border)}
.modal h3{margin-bottom:16px;color:#111827}.modal-close{float:right;cursor:pointer;color:var(--muted);font-size:20px;background:none;border:none}
pre{background:#f8fafc;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:2000;animation:slideUp .3s}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:40px;color:var(--muted)}.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
@media(max-width:900px){.main{padding:16px}.dashboard-grid{grid-template-columns:1fr}.geo-controls{grid-template-columns:1fr 1fr}.geo-controls .form-group:last-child{grid-column:1/-1}.dashboard-map{height:340px}}
@media(max-width:600px){body{display:block}.sidebar{width:100%;display:flex;overflow-x:auto;padding:0;border-right:0;border-bottom:1px solid var(--border)}.sidebar h2{display:none}.sidebar a{border-left:0;border-bottom:3px solid transparent;padding:11px 12px}.sidebar a:hover,.sidebar a.active{border-left-color:transparent;border-bottom-color:var(--primary)}.main{max-height:none}.flex{align-items:flex-start;gap:12px;flex-wrap:wrap}.geo-controls{grid-template-columns:1fr}.geo-controls .form-group:last-child{grid-column:auto}.dashboard-map{height:300px}}
</style>
</head>
<body>
<nav class="sidebar">
  <h2>🛡️ WAF Panel</h2>
  <a class="nav-link active" onclick="nav('dashboard')">📊 仪表盘</a>
  <a class="nav-link" onclick="nav('logs')">📋 攻击日志</a>
  <a class="nav-link" onclick="nav('blocks')">🚫 封锁记录</a>
  <a class="nav-link" onclick="nav('blacklist')">🔒 IP黑/白名单</a>
  <a class="nav-link" onclick="nav('autoban')">🧱 自动封禁</a>
  <a class="nav-link" onclick="nav('pages')">📄 拦截页面</a>
</nav>
<main class="main" id="main"></main>
<div id="toast"></div>
<script src="/static/vendor/leaflet/leaflet.js"></script>
<script>
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),api=async(action,opt={})=>{const u='/api/'+action+(opt.params?'?'+new URLSearchParams(opt.params):'');const r=await fetch(u,{method:opt.method||'GET',headers:{'Content-Type':'application/json'},body:opt.body?JSON.stringify(opt.body):void 0});if(r.status===401){const j=await r.json();if(j.need_login){location.href='/login';return{}}}return r.json()};
function toast(msg,type='success'){const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function setMain(h){$('#main').innerHTML=h}
function nav(page){$$('.nav-link').forEach(a=>a.classList.remove('active'));const l=$(`.nav-link:nth-child(${{dashboard:2,logs:3,blocks:4,blacklist:5,autoban:6,pages:7}[page]})`);if(l)l.classList.add('active');window['page_'+page]()}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ipRuleValue(rule){if(typeof rule==='string')return rule;if(!rule||typeof rule!=='object')return '';if(rule.type==='ipv4')return rule.ipv4||'';if(rule.type==='ipv6')return rule.ipv6||'';if(rule.type==='ipGroup')return rule.ipGroup||'';if(rule.type==='ipArr')return `${rule.ipStart||''}-${rule.ipEnd||''}`;return rule.ipv4||rule.ipv6||rule.ipGroup||''}
function ipRuleState(rule){if(!rule||typeof rule==='string')return 'on';return rule.state==='off'?'off':'on'}

async function page_dashboard(){
  const [d,mapData,geo]=await Promise.all([api('dashboard'),api('map'),api('geo_config')]);if(!d||!mapData||!geo)return;
  _geoState=geo.state;
  const s=d.waf_state==='on'?'运行中':'已关闭',sc=d.waf_state==='on'?'badge-success':'badge-danger';
  const t=d.waf_stat&&d.waf_stat[0]||{};
  setMain(`<h1>📊 仪表盘</h1>
<div id="dashboardMap" class="dashboard-map"></div>
<div class="cards">
  <div class="card"><div class="label">WAF 状态</div><div class="value"><span class="badge ${sc}">${s}</span></div><div class="sub">模式: ${d.waf_mode||'?'}</div></div>
  <div class="card"><div class="label">今日请求</div><div class="value">${t.req_count||0}</div><div class="sub">4xx: ${t.count4xx||0} | 5xx: ${t.count5xx||0}</div></div>
  <div class="card"><div class="label">今日攻击</div><div class="value" style="color:var(--danger)">${t.attack_count||0}</div><div class="sub">${t.req_count?(t.attack_count/t.req_count*100).toFixed(1)+'%':'0%'}</div></div>
  <div class="card"><div class="label">Top IP</div><div class="value" style="font-size:18px">${d.top_ips&&d.top_ips[0]?d.top_ips[0].ip:'—'}</div><div class="sub">${d.top_ips&&d.top_ips[0]?d.top_ips[0].count+' 次':''}</div></div>
</div>
<div class="card dashboard-recent"><div class="flex"><h3 class="section-title" style="margin-bottom:0">最近攻击</h3></div>
<table><thead><tr><th>时间</th><th>IP</th><th>规则</th><th>URI</th><th>状态</th></tr></thead>
<tbody>${(d.recent||[]).map(r=>`<tr><td>${r.localtime||''}</td><td><code>${r.ip||''}</code></td><td><span class="badge badge-warn">${r.rule||''}</span></td><td>${r.uri||''}</td><td>${r.is_block?'<span class="badge badge-danger">拦截</span>':'<span class="badge badge-success">记录</span>'}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无攻击</td></tr>'}</tbody></table></div>
<div class="dashboard-grid">
  <div class="card">
    <h3 class="section-title">地理访问策略</h3>
    <div class="geo-controls">
      <div class="form-group"><label>状态</label><button class="btn ${geo.state==='on'?'btn-danger':'btn-primary'}" id="geoBtn" onclick="toggleGeo()">${geo.state==='on'?'已启用':'已关闭'}</button></div>
      <div class="form-group"><label>动作</label><select id="geoAction"><option value="deny" ${geo.action==='deny'?'selected':''}>拒绝列表地区</option><option value="allow" ${geo.action==='allow'?'selected':''}>仅允许列表地区</option></select></div>
      <div class="form-group"><label>国家/地区代码</label><input id="geoRules" value="${(geo.rules||[]).join(',')}" placeholder="CN,US,RU"></div>
    </div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="saveGeo()">保存并重载</button>
  </div>
  <div class="card">
    <h3 class="section-title">ASN 封禁</h3>
    <div class="row"><input id="asnInput" placeholder="例如 AS4134" style="flex:1;min-width:160px"><button class="btn btn-primary btn-sm" onclick="lookupASN()">查询</button></div>
    <div id="asnResult" style="margin-top:12px"></div>
  </div>
</div>`);
  renderDashboardMap(mapData.points||[]);
}

function renderDashboardMap(points){
  if(!points.length){$('#dashboardMap').innerHTML='<div class="empty">暂无拦截位置数据</div>';return}
  const map=L.map('dashboardMap').setView([30,20],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:18}).addTo(map);
  points.forEach(p=>{L.circleMarker([p.lat,p.lon],{radius:Math.min(20,6+Math.log(p.count+1)*3),fillColor:'#dc2626',color:'#991b1b',weight:1,fillOpacity:.7}).addTo(map).bindPopup(`<b>${p.ip}</b><br>${p.country}, ${p.city||''}<br>攻击: ${p.count}次<br>最近: ${p.last_time}`)});
}

let _logPage=1,_logTotal=0;
async function page_logs(){await loadLogs(1)}
async function loadLogs(p,search=''){
  _logPage=p;const d=await api('logs',{params:{page:p,limit:20,search}});if(!d)return;
  _logTotal=d.total;_logPage=p;
  setMain(`<h1>📋 攻击日志</h1><div class="card">
<div class="flex"><div class="row"><input placeholder="搜索 IP/规则/URI..." id="logSearch" style="width:260px" onkeyup="event.key==='Enter'&&loadLogs(1,this.value)"><button class="btn btn-primary" onclick="loadLogs(1,\$('#logSearch').value)">搜索</button></div><span style="color:var(--muted);font-size:13px">共 ${d.total} 条</span></div>
<div class="table-scroll attack-log-table"><table><thead><tr><th>时间</th><th>IP</th><th>规则</th><th>URI</th><th>匹配值</th><th>临时封禁</th><th>永久黑名单</th><th>操作</th></tr></thead>
<tbody>${d.data.map(r=>`<tr><td>${r.localtime||''}</td><td><code>${r.ip||''}</code></td><td><span class="cell-clip"><span class="badge badge-warn">${r.rule||''}</span></span></td><td><span class="cell-clip" title="${escapeHtml(r.uri||'')}">${escapeHtml(r.uri||'')}</span></td><td><code class="cell-clip" title="${escapeHtml(r.match_val||'')}">${escapeHtml(r.match_val||'')}</code></td><td><span class="toggle ${r.is_temporary_banned?'on':'off'}" title="${r.is_temporary_banned?'解除临时封禁':`临时封禁 ${d.bantime}s`}" onclick="toggleLogBan(${r.id},'${r.ip||''}','temporary',${!r.is_temporary_banned})"></span></td><td><span class="toggle ${r.is_permanent_banned?'on':'off'}" title="${r.is_permanent_banned?'移出永久黑名单':'加入永久黑名单'}" onclick="toggleLogBan(${r.id},'${r.ip||''}','permanent',${!r.is_permanent_banned})"></span></td><td><button class="btn btn-primary btn-sm" onclick="showDetail(${r.id})">详情</button></td></tr>`).join('')||'<tr><td colspan="8" class="empty">暂无</td></tr>'}</tbody></table></div>
<div class="pagination" id="logPages">${renderPagination(d.total,20,p)}</div></div>`);
}
function logSearchValue(){return $('#logSearch')?.value||''}
function renderPagination(total,limit,page){
  const pages=Math.ceil(total/limit);if(!pages)return '';let h='';
  h+=`<button ${page<=1?'disabled':''} onclick="loadLogs(${page-1},logSearchValue())">‹</button>`;
  const visible=new Set([1,pages]);
  for(let i=Math.max(2,page-2);i<=Math.min(pages-1,page+2);i++)visible.add(i);
  let previous=0;
  [...visible].sort((a,b)=>a-b).forEach(i=>{
    if(i-previous>1)h+='<span class="ellipsis">…</span>';
    h+=`<button class="${i===page?'active':''}" onclick="loadLogs(${i},logSearchValue())">${i}</button>`;
    previous=i;
  });
  h+=`<button ${page>=pages?'disabled':''} onclick="loadLogs(${page+1},logSearchValue())">›</button>`;
  return h;
}
async function toggleLogBan(logId,ip,banType,banned){
  if(!ip)return toast('日志没有有效 IP','error');
  const r=await api('log_ban',{method:'POST',body:{log_id:logId,ip,ban_type:banType,banned}});
  if(r&&r.ok){toast(r.message);loadLogs(_logPage,$('#logSearch')?.value||'')}else toast(r?.detail||'操作失败','error');
}
async function showDetail(id){
  const d=await api('log_detail',{params:{id}});if(!d)return;
  document.body.innerHTML+=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal">
<button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><h3>攻击详情 #${d.id}</h3>
<table><tr><td style="color:var(--muted);width:80px">时间</td><td>${d.localtime}</td></tr>
<tr><td style="color:var(--muted)">IP</td><td><code>${d.ip||'?'}</code></td></tr>
<tr><td style="color:var(--muted)">规则</td><td><span class="badge badge-warn">${d.rule||'?'}</span></td></tr>
<tr><td style="color:var(--muted)">URI</td><td>${d.uri||'?'}</td></tr>
<tr><td style="color:var(--muted)">方法</td><td>${d.method||'?'}</td></tr>
<tr><td style="color:var(--muted)">状态码</td><td>${d.status_code||'?'}</td></tr>
<tr><td style="color:var(--muted)">UA</td><td style="font-size:12px">${d.user_agent||'—'}</td></tr>
<tr><td style="color:var(--muted)">拦截</td><td>${d.is_block?'<span class="badge badge-danger">是</span>':'<span class="badge badge-success">否</span>'}</td></tr></table>
<h4 style="margin-top:16px;color:var(--muted);font-size:13px">原始请求</h4><pre>${d.nginx_log||'—'}</pre></div></div>`;
}


async function page_blocks(){
  const d=await api('blocks',{params:{page:1,limit:30}});if(!d)return;
  setMain(`<h1>🚫 封锁记录</h1><div class="card"><table><thead><tr><th>封锁时间</th><th>IP</th><th>时长</th><th>状态</th><th>操作</th></tr></thead>
<tbody>${d.data.map(r=>`<tr><td>${r.create_date||''}</td><td><code>${r.ip||''}</code></td><td>${r.blocking_time?r.blocking_time+'s':'永久'}</td><td>${r.is_block?'<span class="badge badge-danger">封锁中</span>':'<span class="badge badge-success">已解除</span>'}</td><td><button class="btn btn-danger btn-sm" onclick="unblock(${r.id})">解封</button></td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无</td></tr>'}</tbody></table></div>`);
}
async function unblock(id){const r=await api('unblock',{method:'POST',body:{id}});if(r&&r.ok){toast('已解封');page_blocks()}}

let _geoState='off';
async function lookupASN(){
  const asn=$('#asnInput').value.trim();if(!asn)return;
  $('#asnResult').innerHTML='<div class="loading">查询中...</div>';
  const d=await api('asn_lookup',{params:{asn}});
  if(!d||d.error){$('#asnResult').innerHTML=`<p style="color:var(--danger)">${d?.message||'查询失败'}</p>`;return}
  let html=`<p style="margin-bottom:8px"><b>${d.name}</b> — ${d.count} 个 IP 范围</p>`;
  html+=`<button class="btn btn-danger btn-sm" onclick="blockASN('${d.asn}')">封禁此 ASN 全部 IP</button>`;
  html+=`<div style="max-height:300px;overflow-y:auto;margin-top:8px"><table>`;
  d.prefixes.slice(0,50).forEach(p=>{html+=`<tr><td><code>${p.prefix}</code></td><td>${p.description||''}</td><td><button class="btn btn-sm btn-danger" onclick="addSingleIP('${p.prefix}')">添加</button></td></tr>`});
  if(d.prefixes.length>50)html+=`<tr><td colspan="3" style="color:var(--muted)">... 还有 ${d.prefixes.length-50} 个范围</td></tr>`;
  html+=`</table></div>`;
  window._asnPrefixes=d.prefixes;
  $('#asnResult').innerHTML=html;
}
async function blockASN(asn){
  if(!confirm(`确认将 ${asn} 的 ${window._asnPrefixes.length} 个 IP 范围加入黑名单？`))return;
  const r=await api('asn_block',{method:'POST',body:{prefixes:window._asnPrefixes}});
  if(r&&r.ok)toast(r.message);else toast('操作失败','error');
}
async function addSingleIP(prefix){
  const r=await api('blacklist_add',{method:'POST',body:{ip:prefix,type:'black'}});
  if(r&&r.ok)toast(`已添加 ${prefix}`);else toast('添加失败','error');
}
function toggleGeo(){_geoState=_geoState==='on'?'off':'on';const b=$('#geoBtn');b.textContent=_geoState==='on'?'已启用':'已关闭';b.className='btn '+(b.textContent==='已启用'?'btn-danger':'btn-primary')}
async function saveGeo(){const d=await api('geo_config',{method:'POST',body:{state:_geoState,action:$('#geoAction').value,rules:$('#geoRules').value.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean)}});if(d&&d.ok)toast('已保存并重载')}

let _blType='black';
async function page_blacklist(){
  const d=await api('blacklist');if(!d)return;
  setMain(`<h1>🔒 IP黑/白名单</h1>
<div class="card">
<div class="flex"><div class="row" style="margin-bottom:12px"><button class="btn btn-sm ${_blType==='black'?'btn-primary':''}" style="background:${_blType==='black'?'var(--primary)':'var(--border)'}" onclick="_blType='black';page_blacklist()">黑名单 (${d.ipBlack.length})</button><button class="btn btn-sm ${_blType==='white'?'btn-primary':''}" style="background:${_blType==='white'?'var(--primary)':'var(--border)'}" onclick="_blType='white';page_blacklist()">白名单 (${d.ipWhite.length})</button></div></div>
<div class="row"><input id="newIP" placeholder="IP 地址" style="width:200px"><button class="btn btn-primary btn-sm" onclick="addIP()">添加</button></div>
<table style="margin-top:12px"><thead><tr><th>IP</th><th>状态</th><th>操作</th></tr></thead>
<tbody>${(_blType==='black'?d.ipBlack:d.ipWhite).map(rule=>{const ip=ipRuleValue(rule),state=ipRuleState(rule);return `<tr><td><code>${ip}</code></td><td><span class="toggle ${state==='on'?'on':'off'}" onclick="toggleIPState('${ip}','${state}')"></span></td><td><button class="btn btn-danger btn-sm" onclick="removeIP('${ip}')">移除</button></td></tr>`}).join('')||'<tr><td colspan="3" class="empty">暂无</td></tr>'}</tbody></table></div>`);
}
async function addIP(){const ip=$('#newIP').value.trim();if(!ip)return;const r=await api('blacklist_add',{method:'POST',body:{ip,type:_blType}});if(r&&r.ok){toast(r.message);$('#newIP').value='';page_blacklist()}}
async function removeIP(ip){const r=await api('blacklist_remove',{method:'POST',body:{ip,type:_blType}});if(r&&r.ok){toast(r.message);page_blacklist()}}
async function toggleIPState(ip,state){const ns=state==='on'?'off':'on';const r=await api('blacklist_state',{method:'POST',body:{ip,type:_blType,state:ns}});if(r&&r.ok){toast('状态已更新');page_blacklist()}else toast('状态更新失败','error')}

async function page_autoban(){
  const d=await api('autoban_config');if(!d)return;const c=d.config||{};
  setMain(`<h1>🧱 自动封禁</h1>
<div class="card" style="margin-bottom:16px">
  <h3 style="color:#111827;font-size:15px;margin-bottom:12px">主 Jail</h3>
  <div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:8px">
    <div><label><input type="checkbox" id="abEnabled" ${c.enabled?'checked':''} style="width:auto;margin-right:6px">启用 WAF 自动封禁</label></div>
    <div><label><input type="checkbox" id="abLocal" ${c.local_ban?'checked':''} style="width:auto;margin-right:6px">本机防火墙</label></div>
    <div><label><input type="checkbox" id="abWaf" ${c.waf_blacklist?'checked':''} style="width:auto;margin-right:6px">写入 WAF 黑名单</label></div>
    <div><label><input type="checkbox" id="abCf" ${c.cloudflare_ban?'checked':''} style="width:auto;margin-right:6px">Cloudflare 封禁</label></div>
    <div><label><input type="checkbox" id="abRealIp" ${c.cf_real_ip_enabled?'checked':''} style="width:auto;margin-right:6px">Cloudflare 真实 IP</label></div>
  </div>
  <div class="row">
    <div class="form-group" style="width:160px"><label>主 Jail 名称</label><input id="abJail" value="${c.jail_name||''}"></div>
    <div class="form-group" style="width:160px"><label>主 Filter 名称</label><input id="abFilter" value="${c.filter_name||''}"></div>
    <div class="form-group" style="width:160px"><label>监听端口</label><input id="abPort" value="${c.port||'80,443'}" placeholder="80,443 或 22,3389"></div>
    <div class="form-group" style="width:110px"><label>maxretry</label><input id="abMax" type="number" value="${c.maxretry||5}"></div>
    <div class="form-group" style="width:110px"><label>findtime</label><input id="abFind" type="number" value="${c.findtime||600}"></div>
    <div class="form-group" style="width:110px"><label>bantime</label><input id="abBan" type="number" value="${c.bantime||3600}"></div>
    <div class="form-group" style="width:190px"><label>封禁方式</label><select id="abBanaction"><option value="iptables-allports" ${c.banaction==='iptables-allports'?'selected':''}>iptables-allports</option><option value="iptables-multiport" ${c.banaction==='iptables-multiport'?'selected':''}>iptables-multiport</option><option value="firewallcmd-ipset" ${c.banaction==='firewallcmd-ipset'?'selected':''}>firewallcmd-ipset</option><option value="ufw" ${c.banaction==='ufw'?'selected':''}>ufw</option></select></div>
    <div class="form-group" style="width:160px"><label>防火墙链</label><input id="abChain" value="${c.chain||'DOCKER-USER'}"></div>
  </div>
  <div class="form-group"><label>匹配状态码（逗号分隔）</label><input id="abCodes" value="${(c.status_codes||[]).join(',')}"></div>
  <div class="form-group"><label>日志路径（每行一个）</label><textarea id="abLogpaths" style="height:74px">${(c.logpaths||[]).join('\n')}</textarea></div>
  <div class="form-group"><label>忽略 IP/CIDR（每行一个）</label><textarea id="abIgnoreIps" style="height:56px">${(c.ignore_ips||[]).join('\n')}</textarea></div>
  <div class="form-group"><label>忽略正则</label><input id="abIgnoreRegex" value="${escapeHtml(c.ignore_regex||'')}"></div>
</div>
<div class="card" style="margin-bottom:16px">
  <h3 style="color:#111827;font-size:15px;margin-bottom:12px">Cloudflare 配置</h3>
  <div class="row">
    <div class="form-group" style="width:260px"><label>邮箱</label><input id="abCfEmail" value="${c.cloudflare_email||''}"></div>
    <div class="form-group" style="width:360px"><label>API Key / Token</label><input id="abCfKey" type="password" value="${c.cloudflare_api_key||''}"></div>
    <div class="form-group" style="width:220px"><label>备注</label><input id="abCfNote" value="${c.cloudflare_note||''}"></div>
    <div class="form-group" style="width:220px"><label>真实 IP Header</label><select id="abRealIpHeader"><option value="CF-Connecting-IP" ${c.real_ip_header==='CF-Connecting-IP'?'selected':''}>CF-Connecting-IP</option><option value="X-Forwarded-For" ${c.real_ip_header==='X-Forwarded-For'?'selected':''}>X-Forwarded-For</option><option value="X-Real-IP" ${c.real_ip_header==='X-Real-IP'?'selected':''}>X-Real-IP</option><option value="True-Client-IP" ${c.real_ip_header==='True-Client-IP'?'selected':''}>True-Client-IP</option></select></div>
    <div><label><input type="checkbox" id="abRealIpRecursive" ${c.real_ip_recursive?'checked':''} style="width:auto;margin-right:6px">real_ip_recursive</label></div>
  </div>
  <div class="form-group"><label>Cloudflare IP 段（每行一个）</label><textarea id="abCfRanges" style="height:120px">${(c.cf_real_ip_ranges||[]).join('\n')}</textarea></div>
</div>
<div class="card" style="margin-bottom:16px">
  <h3 style="color:#111827;font-size:15px;margin-bottom:8px">自定义 Filters（JSON，可编辑）</h3>
  <div style="font-size:12px;color:var(--muted);margin-bottom:10px">保存后写入独立的 fail2ban filter.d 文件。Filter 依赖：${(d.missing_filters||[]).length?`<span class="badge badge-danger">缺失 ${(d.missing_filters||[]).join(', ')}</span>`:'<span class="badge badge-success">完整</span>'}</div>
  <textarea id="abFilters" style="height:180px;font-family:monospace;font-size:12px">${escapeHtml(JSON.stringify(c.custom_filters||[],null,2))}</textarea>
</div>
<div class="card" style="margin-bottom:16px">
  <h3 style="color:#111827;font-size:15px;margin-bottom:12px">附加 Jails（JSON，可编辑）</h3>
  <textarea id="abJails" style="height:220px;font-family:monospace;font-size:12px">${escapeHtml(JSON.stringify(c.jails||[],null,2))}</textarea>
</div>
<div class="card">
  <div class="row" style="margin-bottom:12px"><button class="btn btn-primary" onclick="saveAutoban()">保存独立配置</button><button class="btn btn-primary" onclick="restartAutoban()">重启 fail2ban</button><button class="btn" style="background:var(--border)" onclick="refreshAutobanStatus()">刷新状态</button><input id="abManualIp" placeholder="手动封禁/解封 IP" style="width:200px"><button class="btn btn-danger btn-sm" onclick="manualAutoban('ban')">封禁</button><button class="btn btn-sm" style="background:var(--border)" onclick="manualAutoban('unban')">解封</button></div>
  <pre id="abStatus">${escapeHtml(d.status?.output||'')}</pre>
</div>`);
}
function autobanPayload(){let jails=[],custom_filters=[];try{custom_filters=JSON.parse($('#abFilters').value||'[]')}catch(e){toast('Filters JSON 格式错误','error');throw e}try{jails=JSON.parse($('#abJails').value||'[]')}catch(e){toast('Jails JSON 格式错误','error');throw e}return {enabled:$('#abEnabled').checked,local_ban:$('#abLocal').checked,banaction:$('#abBanaction').value.trim(),chain:$('#abChain').value.trim(),jail_name:$('#abJail').value.trim(),filter_name:$('#abFilter').value.trim(),port:$('#abPort').value.trim(),maxretry:+$('#abMax').value,findtime:+$('#abFind').value,bantime:+$('#abBan').value,status_codes:$('#abCodes').value.split(',').map(x=>x.trim()).filter(Boolean),logpaths:$('#abLogpaths').value.split('\n').map(x=>x.trim()).filter(Boolean),ignore_ips:$('#abIgnoreIps').value.split('\n').map(x=>x.trim()).filter(Boolean),ignore_regex:$('#abIgnoreRegex').value,custom_filters,waf_blacklist:$('#abWaf').checked,cloudflare_ban:$('#abCf').checked,cloudflare_email:$('#abCfEmail').value.trim(),cloudflare_api_key:$('#abCfKey').value.trim(),cloudflare_note:$('#abCfNote').value.trim(),cf_real_ip_enabled:$('#abRealIp').checked,real_ip_header:$('#abRealIpHeader').value.trim(),real_ip_recursive:$('#abRealIpRecursive').checked,cf_real_ip_ranges:$('#abCfRanges').value.split('\n').map(x=>x.trim()).filter(Boolean),jails}}
async function saveAutoban(){let config;try{config=autobanPayload()}catch(e){return}const r=await api('autoban_config',{method:'POST',body:config});if(r&&r.ok){toast(r.message);page_autoban()}else toast(r?.detail||'保存失败','error')}
async function restartAutoban(){const r=await api('autoban_restart',{method:'POST'});if(r&&r.ok){toast('fail2ban 已重启');refreshAutobanStatus()}else{toast('重启失败','error');if(r)$('#abStatus').textContent=r.output||''}}
async function refreshAutobanStatus(){const r=await api('autoban_status');if(r)$('#abStatus').textContent=r.output||''}
async function manualAutoban(op){const ip=$('#abManualIp').value.trim();if(!ip)return;const r=await api(op==='ban'?'autoban_ban':'autoban_unban',{method:'POST',body:{ip}});if(r&&r.ok){toast(op==='ban'?'已封禁':'已解封');refreshAutobanStatus()}else{toast('操作失败','error');if(r)$('#abStatus').textContent=r.output||''}}

async function page_pages(){
  const d=await api('pages');if(!d)return;
  setMain(`<h1>📄 拦截页面</h1><div class="card"><table><thead><tr><th>文件名</th><th>大小</th><th>修改时间</th><th>操作</th></tr></thead>
<tbody>${d.pages.map(p=>`<tr><td><code>${p.name}</code></td><td>${(p.size/1024).toFixed(1)}KB</td><td>${new Date(p.mtime*1000).toLocaleString()}</td><td><button class="btn btn-primary btn-sm" onclick="editPage('${p.name}')">编辑</button></td></tr>`).join('')}</tbody></table></div>`);
}
async function editPage(name){
  const d=await api('page_get',{params:{name}});if(!d)return;
  setMain(`<h1>📄 编辑: ${name}</h1><div class="card"><textarea id="pgContent" style="height:60vh;font-family:monospace;font-size:12px">${escapeHtml(d.content)}</textarea>
<div class="row" style="margin-top:12px"><button class="btn btn-primary" onclick="savePage('${name}')">💾 保存并重载</button><button class="btn" style="background:var(--border)" onclick="page_pages()">← 返回</button></div></div>`);
}
async function savePage(name){const r=await api('page_save',{method:'POST',body:{name,content:$('#pgContent').value}});if(r&&r.ok)toast('已保存并重载')}

nav('dashboard');
</script>
</body>
</html>
